<!DOCTYPE html>
<html lang="ja">

<head>

    <!-- ==========================================
         Basic
    ========================================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Blog | Kob_asan Official Site</title>

    <meta name="description"
          content="Kob_asan Official Site">

    <meta name="theme-color"
          content="#080b11">

    <link rel="icon" href="assets/favicon/favicon.jpg">

    <!-- ==========================================
         Fonts
    ========================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@300;400;500;700&family=Oswald:wght@400;500;700&display=swap"
          rel="stylesheet">

    <!-- ==========================================
         CSS
    ========================================== -->

    <link rel="stylesheet" href="assets/css/reset.css">

    <link rel="stylesheet" href="assets/css/variables.css">

    <link rel="stylesheet" href="assets/css/common.css">

    <link rel="stylesheet" href="assets/css/layout.css">

    <link rel="stylesheet" href="assets/css/header.css">

    <link rel="stylesheet" href="assets/css/footer.css">

    <link rel="stylesheet" href="assets/css/background.css">

    <link rel="stylesheet" href="assets/css/animation.css">

    <link rel="stylesheet" href="assets/css/components.css">

    <link rel="stylesheet" href="assets/css/pages/home.css">

    <link rel="stylesheet" href="assets/css/pages/blog.css">

</head>

<body>

    <!-- ==========================================
         Background
    ========================================== -->

    <div class="background">

        <div class="stars"></div>

    </div>

    <!-- ==========================================
         Header
    ========================================== -->

    <header class="site-header">

        <div class="header-inner">

            <a href="index.html" class="site-logo">

                <span class="site-logo-main">
                    Kob_asan
                </span>

                <span class="site-logo-sub">
                    OFFICIAL SITE
                </span>

            </a>

            <nav class="site-nav">

                <a href="index.html">
                    Home
                </a>

                <a href="blog.html">
                    Blog
                </a>

                <a href="about.html">
                    About
                </a>

                <a href="works.html">
                    Works
                </a> 

            </nav>

        </div>

    </header>

    <main>

    <!-- ==========================================
         Blog Hero
    ========================================== -->

    <section class="blog-hero section">

        <div class="container">

            <div class="blog-heading fade-in">

                <p class="section-label">
                    BLOG
                </p>

                <h1 class="page-title">
                    Articles
                </h1>

                <p class="blog-description">
                    Web制作や日々の記録など、
                    Kob_asanの活動を発信しています。
                </p>

            </div>

        </div>

    </section>


    <!-- ==========================================
         Blog Posts
    ========================================== -->

    <section class="blog-posts section">

        <div class="container">

            <div class="blog-search fade-in">

    <svg class="blog-search-icon"
         viewBox="0 0 24 24"
         fill="none">

        <circle cx="11"
                cy="11"
                r="7"
                stroke="currentColor"
                stroke-width="2"/>

        <path d="M20 20L17 17"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"/>

    </svg>

    <input
        id="blog-search"
        type="text"
        placeholder="Search articles..."
        autocomplete="off">

</div>

            <div class="blog-grid">

                <!-- JavaScriptで生成 -->

            </div>


            <!-- ==========================================
                 Pagination
            ========================================== -->

            <nav class="pagination">

                <!-- JavaScriptで生成 -->

            </nav>


        </div>

    </section>

</main>

    <!-- ==========================================
         Footer
    ========================================== -->

    <footer class="site-footer">

        <div class="footer-inner">

            <div class="footer-info">

                <h2 class="footer-title">
                    Kob_asan Official Site
                </h2>

                <p class="footer-copy">
                    © <span id="copyright-year"></span> Kob_asan.
                </p>

            </div>

            <nav class="footer-nav">

                <a href="index.html">
                    Home
                </a>

                <a href="blog.html">
                    Blog
                </a>

                <a href="about.html">
                    About
                </a>

                <a href="works.html">
                    Works
                </a> 

            </nav>

        </div>

    </footer>

    <!-- ==========================================
         JavaScript
    ========================================== -->

    <script 
    type="module" 
    src="assets/js/main.js"></script>

</body>

</html>
