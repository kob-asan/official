<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Timetable | Kob_asan Official Site</title>

    <meta name="description"
          content="Kob_asan Official Site">

    <meta name="theme-color"
          content="#080b11">

    <link rel="icon" href="../../assets/favicon/favicon.jpg">

    <!-- ==========================================

    ========================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@300;400;500;700&family=Oswald:wght@400;500;700&display=swap"
          rel="stylesheet">

    <!-- ==========================================
         CSS
    ========================================== -->

    <link rel="stylesheet" href="../../assets/css/reset.css">

    <link rel="stylesheet" href="../../assets/css/variables.css">

    <link rel="stylesheet" href="../../assets/css/common.css">

    <link rel="stylesheet" href="../../assets/css/layout.css">

    <link rel="stylesheet" href="../../assets/css/header.css">

    <link rel="stylesheet" href="../../assets/css/footer.css">

    <link rel="stylesheet" href="../../assets/css/background.css">

    <link rel="stylesheet" href="../../assets/css/animation.css">

    <link rel="stylesheet" href="../../assets/css/components.css">

    <link rel="stylesheet" href="../../assets/css/pages/home.css">

    <link rel="stylesheet" href="../../assets/css/splash.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================================
         Background
    ========================================== -->

    <div class="background">

        <div class="stars"></div>

    </div>

    <!-- ==========================================
         Header
    ========================================== -->

    <header class="site-header">

        <div class="header-inner">

            <a href="../../index.html" class="site-logo">

                <span class="site-logo-main">
                    Kob_asan
                </span>

                <span class="site-logo-sub">
                    OFFICIAL SITE
                </span>

            </a>

            <nav class="site-nav">

                <a href="../../index.html">
                    Home
                </a>

                <a href="../../blog.html">
                    Blog
                </a>

                <a href="../../about.html">
                    About
                </a>

                <a href="../../works.html">
                    Works
                </a> 

            </nav>

        </div>

    </header>

    <main class="container">

    <section class="glass-card timetable-card">

        <div class="page-header">

            <h1>Time Table</h1>

            <p>
                まあ簡単なlocalstorageを使った時間割です。
            </p>

        </div>

        <div class="table-wrapper">

            <table class="timetable">

                <thead>

                    <tr>

                        <th></th>

                        <th data-day="1">Mon</th>

                        <th data-day="2">Tue</th>

                        <th data-day="3">Wed</th>

                        <th data-day="4">Thu</th>

                        <th data-day="5">Fri</th>

                        <th data-day="6">Sat</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <th>1</th>
                        <td><input data-key="1-1" maxlength="15"></td>
                        <td><input data-key="1-2" maxlength="15"></td>
                        <td><input data-key="1-3" maxlength="15"></td>
                        <td><input data-key="1-4" maxlength="15"></td>
                        <td><input data-key="1-5" maxlength="15"></td>
                        <td><input data-key="1-6" maxlength="15"></td>
                    </tr>

                    <tr>
                        <th>2</th>
                        <td><input data-key="2-1" maxlength="15"></td>
                        <td><input data-key="2-2" maxlength="15"></td>
                        <td><input data-key="2-3" maxlength="15"></td>
                        <td><input data-key="2-4" maxlength="15"></td>
                        <td><input data-key="2-5" maxlength="15"></td>
                        <td><input data-key="2-6" maxlength="15"></td>
                    </tr>

                    <tr>
                        <th>3</th>
                        <td><input data-key="3-1" maxlength="15"></td>
                        <td><input data-key="3-2" maxlength="15"></td>
                        <td><input data-key="3-3" maxlength="15"></td>
                        <td><input data-key="3-4" maxlength="15"></td>
                        <td><input data-key="3-5" maxlength="15"></td>
                        <td><input data-key="3-6" maxlength="15"></td>
                    </tr>

                    <tr>
                        <th>4</th>
                        <td><input data-key="4-1" maxlength="15"></td>
                        <td><input data-key="4-2" maxlength="15"></td>
                        <td><input data-key="4-3" maxlength="15"></td>
                        <td><input data-key="4-4" maxlength="15"></td>
                        <td><input data-key="4-5" maxlength="15"></td>
                        <td><input data-key="4-6" maxlength="15"></td>
                    </tr>

                    <tr>
                        <th>5</th>
                        <td><input data-key="5-1" maxlength="15"></td>
                        <td><input data-key="5-2" maxlength="15"></td>
                        <td><input data-key="5-3" maxlength="15"></td>
                        <td><input data-key="5-4" maxlength="15"></td>
                        <td><input data-key="5-5" maxlength="15"></td>
                        <td><input data-key="5-6" maxlength="15"></td>
                    </tr>

                    <tr>
                        <th>6</th>
                        <td><input data-key="6-1" maxlength="15"></td>
                        <td><input data-key="6-2" maxlength="15"></td>
                        <td><input data-key="6-3" maxlength="15"></td>
                        <td><input data-key="6-4" maxlength="15"></td>
                        <td><input data-key="6-5" maxlength="15"></td>
                        <td><input data-key="6-6" maxlength="15"></td>
                    </tr>

                </tbody>

            </table>

        </div>

        <div class="actions">

            <button id="resetButton">
                Reset
            </button>

        </div>

    </section>

</main>

    <footer class="site-footer">

        <div class="footer-inner">

            <div class="footer-info">

            <nav class="footer-nav">
